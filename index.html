<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>moaai</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-1: #eefcff;
      --bg-2: #dff8fb;
      --bg-3: #f7fffe;
      --line: rgba(16, 84, 92, 0.08);
      --text-soft: rgba(14, 69, 78, 0.78);
      --glow-cyan: rgba(0, 177, 173, 0.18);
      --glow-mint: rgba(0, 198, 170, 0.16);
      --gold-1: #7af7ef;
      --gold-2: #00a79d;
      --gold-3: #d9fffb;
      --btn-1: #0ec7ba;
      --btn-2: #0aa89f;
      --btn-text: #ffffff;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
      background:
        radial-gradient(circle at 18% 18%, rgba(0, 183, 179, 0.10), transparent 26%),
        radial-gradient(circle at 82% 30%, rgba(0, 199, 171, 0.10), transparent 30%),
        radial-gradient(circle at 50% 82%, rgba(0, 160, 150, 0.06), transparent 28%),
        linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 46%, var(--bg-3) 100%);
      color: #0d4650;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      isolation: isolate;
    }

    .frame {
      position: absolute;
      inset: 30px;
      border: 1px solid rgba(0, 132, 140, 0.10);
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255,255,255,0.62), rgba(255,255,255,0.34));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.85),
        0 24px 60px rgba(0, 123, 132, 0.10);
      backdrop-filter: blur(8px);
      z-index: -2;
    }

    .frame::before,
    .frame::after {
      content: "";
      position: absolute;
      border-radius: 28px;
      pointer-events: none;
    }

    .frame::before {
      inset: 14px;
      border: 1px solid rgba(255,255,255,0.04);
    }

    .frame::after {
      inset: -1px;
      background: linear-gradient(135deg, rgba(255,255,255,0.08), transparent 25%, transparent 75%, rgba(255,255,255,0.06));
      mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      padding: 1px;
      mask-composite: exclude;
      -webkit-mask-composite: xor;
    }

    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,120,128,0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,120,128,0.045) 1px, transparent 1px);
      background-size: 52px 52px;
      mask-image: radial-gradient(circle at center, black 40%, transparent 88%);
      opacity: 0.5;
      animation: gridMove 18s linear infinite;
      z-index: -4;
    }

    .ring,
    .ring::before,
    .ring::after {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }

    .ring {
      width: 720px;
      height: 720px;
      border: 1px solid rgba(255,255,255,0.06);
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.42;
      animation: rotateSlow 28s linear infinite;
      z-index: -3;
    }

    .ring::before {
      content: "";
      inset: 70px;
      border: 1px solid rgba(255,255,255,0.05);
      animation: rotateSlowReverse 20s linear infinite;
    }

    .ring::after {
      content: "";
      inset: 145px;
      border: 1px solid rgba(255,255,255,0.045);
      animation: rotateSlow 14s linear infinite;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(34px);
      z-index: -3;
      opacity: 0.78;
    }

    .orb1 {
      width: 400px;
      height: 400px;
      left: 10%;
      top: 12%;
      background: var(--glow-cyan);
      animation: floatOrb 10s ease-in-out infinite;
    }

    .orb2 {
      width: 430px;
      height: 430px;
      right: 8%;
      bottom: 10%;
      background: var(--glow-mint);
      animation: floatOrb 12s ease-in-out infinite reverse;
    }

    .orb3 {
      width: 260px;
      height: 260px;
      right: 24%;
      top: 16%;
      background: rgba(96, 245, 225, 0.14);
      filter: blur(40px);
      animation: floatOrb 13s ease-in-out infinite;
      z-index: -3;
    }

    .particles {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: -2;
    }

    .particles span {
      position: absolute;
      bottom: -20px;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255,255,255,0.9);
      box-shadow: 0 0 10px rgba(255,255,255,0.45);
      opacity: 0;
      animation: rise linear infinite;
    }

    .particles span:nth-child(1) { left: 9%; animation-duration: 10s; animation-delay: 0s; }
    .particles span:nth-child(2) { left: 18%; animation-duration: 13s; animation-delay: 1.8s; }
    .particles span:nth-child(3) { left: 27%; animation-duration: 11s; animation-delay: 0.8s; width: 5px; height: 5px; }
    .particles span:nth-child(4) { left: 39%; animation-duration: 14s; animation-delay: 3s; }
    .particles span:nth-child(5) { left: 49%; animation-duration: 12s; animation-delay: 2.2s; }
    .particles span:nth-child(6) { left: 62%; animation-duration: 10.5s; animation-delay: 1.2s; width: 5px; height: 5px; }
    .particles span:nth-child(7) { left: 73%; animation-duration: 14.5s; animation-delay: 2.8s; }
    .particles span:nth-child(8) { left: 84%; animation-duration: 12.5s; animation-delay: 0.4s; }
    .particles span:nth-child(9) { left: 92%; animation-duration: 13.5s; animation-delay: 4.1s; }

    .container {
      width: min(92vw, 1160px);
      padding: 56px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 42px;
      position: relative;
      z-index: 2;
    }

    .eyebrow {
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: rgba(230, 244, 255, 0.52);
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 1s ease 0.15s forwards;
    }

    .logo-wrap {
      position: relative;
      padding: 20px 24px 10px;
      margin-bottom: 8px;
    }

    .logo-aura {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(72vw, 820px);
      height: min(22vw, 250px);
      border-radius: 999px;
      background: radial-gradient(circle, rgba(0,167,157,0.18) 0%, rgba(0,190,180,0.18) 35%, rgba(113,247,239,0.16) 58%, transparent 78%);
      filter: blur(30px);
      animation: auraPulse 4.5s ease-in-out infinite;
      z-index: -1;
    }

    .logo {
      position: relative;
      font-size: clamp(5.8rem, 14vw, 12rem);
      font-weight: 950;
      letter-spacing: 0.09em;
      text-transform: lowercase;
      color: transparent;
      background: linear-gradient(90deg, #006e69 0%, #008d86 22%, #00aaa1 48%, #007f79 72%, #004f4c 100%);
      background-size: 220% auto;
      -webkit-background-clip: text;
      background-clip: text;
      text-shadow:
        0 0 2px rgba(0, 82, 78, 0.35),
        0 0 14px rgba(0, 145, 135, 0.18),
        0 8px 24px rgba(0, 118, 110, 0.16);
      filter: drop-shadow(0 6px 18px rgba(0, 122, 114, 0.18));
      opacity: 0;
      transform: translateY(26px) scale(0.96);
      animation:
        logoEnter 1.6s cubic-bezier(.2,.8,.2,1) forwards,
        shimmer 5.2s linear 1.3s infinite,
        elegantFloat 5.5s ease-in-out 1.7s infinite;
    }

    .logo::before {
      content: "moaai";
      position: absolute;
      inset: 0;
      color: rgba(255,255,255,0.07);
      filter: blur(12px);
      transform: translateY(10px) scale(1.03);
      z-index: -1;
    }

    .logo::after {
      content: none;
    }

    .tagline-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 26px;
      margin-top: 6px;
      margin-bottom: 8px;
    }

    .tagline-wrap::before,
    .tagline-wrap::after {
      content: "";
      width: clamp(60px, 10vw, 120px);
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0, 142, 148, 0.45), transparent);
      animation: lineGlow 3.2s ease-in-out infinite;
    }

    .tagline::after {
      content: "";
      position: absolute;
      top: 12%;
      height: 76%;
      width: 2px;
      left: 0;
      background: rgba(0, 140, 132, 0.85);
      box-shadow: 0 0 8px rgba(0, 170, 160, 0.22);
      animation:
        caretTravel 2.6s steps(20, end) 0.7s forwards,
        caretBlink 0.8s step-end infinite;
    }

    .tagline {
      position: relative;
      display: inline-block;
      font-size: clamp(1.35rem, 2.7vw, 2.45rem);
      font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
      font-weight: 800;
      letter-spacing: 0.24em;
      line-height: 1.8;
      color: transparent;
      background: linear-gradient(90deg, #0f616b 0%, #12818e 30%, #00a89f 58%, #0d5c66 100%);
      background-size: 220% auto;
      -webkit-background-clip: text;
      background-clip: text;
      text-shadow: 0 0 20px rgba(255,255,255,0.06);
      white-space: nowrap;
      overflow: visible;
      clip-path: inset(0 100% 0 0);
      animation:
        typingReveal 2.6s steps(20, end) 0.7s forwards,
        shimmer 5s linear infinite;
    }

    .sub-glow {
      font-size: 0.95rem;
      letter-spacing: 0.28em;
      color: rgba(231, 244, 255, 0.42);
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(14px);
      animation: fadeUp 1s ease 0.95s forwards;
    }

    .start-btn {
      margin-top: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 320px;
      height: 84px;
      padding: 0 46px;
      border-radius: 999px;
      text-decoration: none;
      font-size: clamp(1.3rem, 2vw, 1.7rem);
      font-weight: 800;
      letter-spacing: 0.14em;
      color: var(--btn-text);
      background: linear-gradient(135deg, var(--btn-1) 0%, var(--btn-2) 55%, #0b8f88 100%);
      border: 1px solid rgba(0,130,124,0.18);
      box-shadow:
        0 16px 40px rgba(0,0,0,0.28),
        0 0 0 1px rgba(255,255,255,0.10) inset,
        0 0 36px rgba(132, 230, 255, 0.15);
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 1.1s ease 1.15s forwards;
      transition: transform 0.28s ease, box-shadow 0.28s ease, filter 0.28s ease;
    }

    .start-btn::before {
      content: "";
      position: absolute;
      top: -120%;
      left: -32%;
      width: 36%;
      height: 320%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.68), transparent);
      transform: rotate(18deg);
      animation: btnSweep 3.6s ease-in-out 2.1s infinite;
    }

    .start-btn:hover {
      transform: translateY(-5px) scale(1.03);
      box-shadow:
        0 22px 48px rgba(0,0,0,0.32),
        0 0 0 1px rgba(255,255,255,0.14) inset,
        0 0 54px rgba(132, 230, 255, 0.20);
      filter: brightness(1.03);
    }

    .start-btn:active {
      transform: translateY(-1px) scale(0.995);
    }

    @keyframes logoEnter {
      0% {
        opacity: 0;
        transform: translateY(26px) scale(0.96);
        filter: blur(10px);
      }
      65% {
        opacity: 1;
        transform: translateY(0) scale(1.02);
        filter: blur(0);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes typingReveal {
      from { clip-path: inset(0 100% 0 0); }
      to { clip-path: inset(0 0 0 0); }
    }

    @keyframes caretTravel {
      from { left: 0; }
      to { left: calc(100% + 4px); }
    }

    @keyframes caretBlink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    @keyframes shimmer {
      from { background-position: 0% 50%; }
      to { background-position: 220% 50%; }
    }

    @keyframes auraPulse {
      0%, 100% { transform: translate(-50%, -50%) scale(0.97); opacity: 0.72; }
      50% { transform: translate(-50%, -50%) scale(1.07); opacity: 1; }
    }

    @keyframes elegantFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes logoSweep {
      0% { left: -14%; opacity: 0; }
      18% { opacity: 1; }
      58% { opacity: 1; }
      100% { left: 112%; opacity: 0; }
    }

    @keyframes btnSweep {
      0% { left: -38%; opacity: 0; }
      14% { opacity: 1; }
      58% { opacity: 1; }
      100% { left: 128%; opacity: 0; }
    }

    @keyframes lineGlow {
      0%, 100% { opacity: 0.45; transform: scaleX(0.92); }
      50% { opacity: 1; transform: scaleX(1.08); }
    }

    @keyframes rise {
      0% {
        transform: translateY(0) scale(0.65);
        opacity: 0;
      }
      15% {
        opacity: 0.8;
      }
      85% {
        opacity: 0.28;
      }
      100% {
        transform: translateY(-108vh) scale(1.22);
        opacity: 0;
      }
    }

    @keyframes floatOrb {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(18px, -22px) scale(1.06); }
    }

    @keyframes gridMove {
      0% { transform: translateY(0); }
      100% { transform: translateY(52px); }
    }

    @keyframes rotateSlow {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    @keyframes rotateSlowReverse {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }

    @media (max-width: 900px) {
      .frame {
        inset: 18px;
      }

      .tagline-wrap {
        gap: 12px;
      }
    }
    }

    @media (max-width: 640px) {
      .container {
        gap: 28px;
      }

      .tagline-wrap::before,
      .tagline-wrap::after,
      .sub-glow,
      .eyebrow {
        display: none;
      }

      .start-btn {
        min-width: 240px;
        height: 72px;
        padding: 0 28px;
        letter-spacing: 0.08em;
      }

      .ring {
        width: 520px;
        height: 520px;
      }
    }
  </style>
</head>
<body>
  <div class="grid"></div>
  <div class="frame"></div>
  <div class="ring"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <div class="particles" aria-hidden="true">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
  </div>

  <main class="container">
    <div class="logo-wrap">
      <div class="logo-aura"></div>
      <h1 class="logo">moaai</h1>
    </div>

    <div class="tagline-wrap">
      <div class="tagline">기술과 기업을 연결하다</div>
    </div>

    <a class="start-btn" href="M100.html">시작하기</a>
  </main>
</body>
</html>
