<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>모아아이 M122 새 비밀번호 설정</title>
  <style>
* { box-sizing: border-box; }
:root {
  --bg: #f4f8f8;
  --surface: #ffffff;
  --surface-soft: #f8fcfb;
  --text: #0f172a;
  --muted: #5b6b75;
  --border: #d7e5e3;
  --teal: #0f766e;
  --teal-soft: #d9f2ef;
  --soft-blue: #eaf4ff;
  --shadow: 0 18px 45px rgba(15, 118, 110, 0.08);
}
body { margin: 0; font-family: "Pretendard","Noto Sans KR","Apple SD Gothic Neo",Arial,sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
a { text-decoration: none; color: inherit; }
.container { width: min(1200px, calc(100% - 48px)); margin: 0 auto; }
.header { position: sticky; top:0; z-index:20; background: rgba(255,255,255,0.92); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(215,229,227,0.9); }
.header-inner { display:flex; align-items:flex-start; justify-content:space-between; gap:24px; min-height:84px; padding:18px 0 14px; }
.brand { display:flex; flex-direction:column; gap:4px; }
.brand-title { font-size:2rem; font-weight:800; letter-spacing:-0.03em; color:#102236; }
.brand-sub { font-size:0.95rem; color:var(--muted); }
.nav, .header-context { display:flex; align-items:center; justify-content:flex-end; gap:12px; margin-left:auto; align-self:flex-start; margin-top:2px; flex-wrap:wrap; }
.nav a, .header-context a, .btn, .nav-btn, .action-btn, .profile-btn {
  display:inline-flex; align-items:center; justify-content:center; min-width:108px; height:44px; padding:0 18px;
  border-radius:999px; border:1px solid var(--border); background:var(--soft-blue); color:#23404d; font-weight:700; transition:.2s ease; cursor:pointer;
}
.header-context a { min-width:172px; height:52px; padding:0 22px; font-size:1rem; font-weight:800; }
.nav a:hover,.header-context a:hover,.btn:hover,.nav-btn:hover,.nav-btn.active,.action-btn:hover,.profile-btn:hover {
  background: var(--teal); color:#fff; border-color:var(--teal); box-shadow:0 10px 22px rgba(15,118,110,.18);
}
.page { padding:48px 0 80px; background:var(--bg); }
.hero-wrap { padding:54px 0 30px; }
.hero { display:grid; grid-template-columns:1.08fr .92fr; gap:40px; align-items:center; padding:64px 40px; background:linear-gradient(180deg,#f2fbfa 0%,#eef6f6 100%); border:1px solid var(--border); border-radius:36px; }
.eyebrow { display:inline-flex; align-items:center; padding:10px 16px; border-radius:999px; background:var(--teal-soft); color:var(--teal); font-size:.95rem; font-weight:700; margin-bottom:22px; }
.hero h1 { margin:0; font-size:clamp(2.2rem,4.2vw,3.5rem); line-height:1.16; letter-spacing:-.05em; font-weight:850; color:#0b1f30; }
.hero p { margin:26px 0 0; font-size:1.18rem; color:#445463; max-width:780px; }
.hero-actions { display:flex; gap:14px; flex-wrap:wrap; justify-content:flex-end; margin-top:32px; }
.panel, .summary-panel, .dashboard-header-card, .complete-card { background:rgba(255,255,255,.96); border:1px solid var(--border); border-radius:30px; padding:28px 26px; box-shadow:var(--shadow); }
.dashboard-header-card { margin-bottom:24px; }
.summary-grid,.feature-grid,.stats-grid,.detail-grid,.profile-layout,.auth-layout,.dual-grid { display:grid; gap:22px; }
.summary-grid { grid-template-columns:repeat(2,minmax(0,1fr)); }
.feature-grid { grid-template-columns:repeat(3,minmax(0,1fr)); }
.stats-grid { grid-template-columns:repeat(5,minmax(0,1fr)); }
.detail-grid { grid-template-columns:1fr 1fr; }
.profile-layout { grid-template-columns:1fr 1fr; }
.auth-layout { grid-template-columns:1fr 1.05fr; }
.dual-grid { grid-template-columns:1fr 1fr; }
.mini-card,.stat-card,.data-card,.detail-card,.profile-card,.card { background:var(--surface); border:1px solid var(--border); border-radius:24px; padding:22px 20px; box-shadow:var(--shadow); }
.mini-card h3,.data-card h3,.detail-card h3,.profile-card h3,.card h3 { margin:0 0 12px; font-size:1.35rem; letter-spacing:-.03em; color:#0f172a; }
.muted,.mini-card p,.data-card p,.detail-card p,.profile-card p,.card p,.section-head p { color:var(--muted); }
.section { padding:40px 0 80px; }
.section-head { text-align:center; margin-bottom:34px; }
.section-head h2,.dashboard-header-card h2,.complete-card h2,.panel h2 { margin:0; font-size:clamp(2rem,3.4vw,2.8rem); line-height:1.2; letter-spacing:-.04em; color:#0b1f30; }
.feature-no { display:inline-flex; align-items:center; justify-content:center; width:46px; height:46px; border-radius:14px; background:var(--teal-soft); color:var(--teal); font-size:1.15rem; font-weight:800; margin-bottom:16px; }
.tab-wrap { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:20px 0 18px; }
.tab-btn { height:50px; border-radius:16px; border:1px solid #c8d8d6; background:var(--soft-blue); color:#23404d; font-size:1rem; font-weight:800; cursor:pointer; transition:.2s ease; }
.tab-btn.active,.tab-btn:hover { background:var(--teal); color:#fff; border-color:var(--teal); box-shadow:0 10px 22px rgba(15,118,110,.18); }
.form,.compact-form { display:flex; flex-direction:column; gap:10px; }
.compact-form-grid,.profile-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px 16px; align-items:end; }
.field { display:flex; flex-direction:column; gap:8px; }
.form label,.compact-form label,.profile-card label { font-size:1rem; font-weight:800; color:#0f172a; }
input,select,textarea { width:100%; min-height:52px; padding:0 16px; border-radius:16px; border:1px solid #cfd9d7; background:#fff; font-size:1rem; color:#0f172a; outline:none; transition:border-color .2s ease, box-shadow .2s ease; }
textarea { min-height:120px; padding:14px 16px; resize: vertical; }
input:focus,select:focus,textarea:focus { border-color:var(--teal); box-shadow:0 0 0 4px rgba(15,118,110,.10); }
.readonly { background:#f7fbfa !important; color:#5b6b75 !important; }
.meta-row,.actions,.dashboard-actions,.profile-actions,.complete-actions,.complete-row { display:flex; align-items:center; justify-content:flex-end; gap:12px; flex-wrap:wrap; }
.meta-row { justify-content:space-between; color:#6a7a86; font-size:.98rem; margin:6px 0 8px; }
.meta-row a { color:var(--teal); font-weight:700; }
.note,.dashboard-note,.detail-summary,.profile-note { padding:16px 18px; border-radius:18px; border:1px solid var(--border); background:var(--surface-soft); color:#4f6070; font-size:.96rem; line-height:1.7; }
.dashboard-header-top { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; flex-wrap:wrap; }
.page-nav { display:flex; gap:14px; flex-wrap:wrap; margin-top:24px; }
.nav-btn,.action-btn,.profile-btn,.btn { min-width:150px; height:50px; border-radius:16px; }
.stat-card .label { font-size:.95rem; color:#5b6b75; font-weight:700; margin-bottom:10px; }
.stat-card .value { font-size:2rem; line-height:1.1; letter-spacing:-.04em; font-weight:900; color:#0b1f30; }
.stat-card .sub { margin-top:8px; color:#6a7a86; font-size:.92rem; }
.status-list { display:grid; gap:12px; }
.status-item { display:grid; grid-template-columns:120px 1fr 56px; align-items:center; gap:12px; }
.status-name { font-weight:700; color:#23404d; font-size:.96rem; }
.status-bar { width:100%; height:12px; border-radius:999px; background:#eaf1f0; overflow:hidden; }
.status-fill { height:100%; border-radius:999px; background:var(--teal); }
.status-count { text-align:right; font-weight:800; }
.table { width:100%; border-collapse:collapse; }
.table th,.table td { padding:14px 12px; border-bottom:1px solid #dbe7e5; text-align:left; font-size:.96rem; vertical-align:top; }
.table th { color:#5b6b75; font-weight:800; }
.table td { color:#0f172a; }
.tag { display:inline-flex; align-items:center; justify-content:center; min-width:70px; min-height:32px; padding:0 12px; border-radius:999px; background:var(--soft-blue); border:1px solid var(--border); color:#23404d; font-size:.86rem; font-weight:800; }
.linklike { color:#0f172a; font-weight:700; cursor:pointer; text-decoration:underline; text-underline-offset:3px; }
.linklike:hover { color:var(--teal); }
.detail-wide { grid-column:1 / -1; }
.detail-list { display:grid; gap:12px; }
.detail-item { padding-bottom:12px; border-bottom:1px solid #dbe7e5; }
.detail-item:last-child { border-bottom:none; padding-bottom:0; }
.detail-item .k { display:block; font-size:.9rem; color:#5b6b75; font-weight:800; margin-bottom:4px; }
.detail-item .v { display:block; font-size:1rem; color:#0f172a; line-height:1.7; }
.insight-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:14px; margin-top:18px; }
.insight-box { padding:18px; border-radius:18px; border:1px solid var(--border); background:var(--surface-soft); }
.insight-box h4 { margin:0 0 8px; font-size:1.05rem; color:#0f172a; letter-spacing:-.02em; }
.insight-box p { margin:0; color:#4f6070; font-size:.96rem; line-height:1.7; }
.keyword-badges { display:flex; flex-wrap:wrap; gap:10px; margin-top:10px; }
.keyword-badge { display:inline-flex; align-items:center; justify-content:center; min-height:34px; padding:0 14px; border-radius:999px; border:1px solid var(--border); background:var(--soft-blue); color:#23404d; font-size:.9rem; font-weight:800; }
.complete-info-box { padding:18px 20px; border-radius:20px; border:1px solid var(--border); background:var(--surface-soft); }
.complete-row { justify-content:space-between; gap:16px; padding:14px 0; border-bottom:1px solid #dbe7e5; }
.complete-row:last-child { border-bottom:none; }
.complete-row span { color:#4f6070; font-weight:700; }
.complete-row strong { color:#0f172a; text-align:right; word-break:break-all; }
.footer-space { height: 24px; }
@media (max-width:1080px){
  .hero,.summary-grid,.feature-grid,.stats-grid,.detail-grid,.profile-layout,.auth-layout,.dual-grid,.compact-form-grid,.profile-grid,.insight-grid { grid-template-columns:1fr; }
}
@media (max-width:760px){
  .container { width:min(100% - 28px,1200px); }
  .header-inner { min-height:auto; padding:16px 0; align-items:flex-start; flex-direction:column; }
  .nav,.header-context { gap:10px; }
  .hero { padding:34px 22px; border-radius:26px; }
  .hero h1 { font-size:2rem; }
  .panel,.summary-panel,.dashboard-header-card,.complete-card,.mini-card,.stat-card,.data-card,.detail-card,.profile-card,.card { padding:22px 18px; border-radius:24px; }
  .tab-wrap { grid-template-columns:1fr; }
  .meta-row,.actions,.dashboard-actions,.profile-actions,.complete-actions,.dashboard-header-top,.complete-row { flex-direction:column; align-items:flex-start; }
  .status-item { grid-template-columns:1fr; }
  .complete-row strong { text-align:left; }
}
</style>
  
</head>
<body>
  <header class="header">
  <div class="container header-inner">
    <div class="brand">
      <a href="M100.html" class="brand-title">모아아이</a>
      <div class="brand-sub">보유 특허 관리 및 기술연계 플랫폼</div>
    </div>
    <nav class="nav" id="header-nav"><a href="M110.html">로그인</a><a href="M130.html">회원가입</a></nav>
  </div>
</header>
  <main class="page" style="display:block;">
    
<section>
  <div class="container">
    <div class="auth-layout">
      <div class="panel">
        <h2>새 비밀번호 설정</h2>
        <p class="muted">새로운 비밀번호를 입력해 주세요. 시범용 화면에서는 입력값 확인 후 완료 화면으로 이동합니다.</p>
        <div class="card"><h3>비밀번호 안내</h3><p>영문, 숫자, 특수문자를 포함한 8자 이상 형식으로 설정하는 흐름을 가정합니다.</p></div>
      </div>
      <div class="panel">
        <h2>새 비밀번호 설정</h2>
        <form class="form" id="password-reset-form">
          <label for="pw-new-password">새 비밀번호</label>
          <input id="pw-new-password" type="password" placeholder="새 비밀번호를 입력해 주세요" />
          <label for="pw-new-password-check">새 비밀번호 확인</label>
          <input id="pw-new-password-check" type="password" placeholder="새 비밀번호를 다시 입력해 주세요" />
          <div class="actions">
            <button type="submit" class="btn">비밀번호 변경</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>

  </main>
  <div class="footer-space"></div>
  
<script>
document.getElementById('password-reset-form').addEventListener('submit', function(e){
  e.preventDefault();
  location.href = 'M123.html';
});
</script>

</body>
</html>
