<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>모아아이 M270 신규 특허 출원 관련 문의</title>
  <style>
* { box-sizing: border-box; }
:root {
  --bg: #f4f8f8;
  --surface: #ffffff;
  --surface-soft: #f8fcfb;
  --text: #0f172a;
  --muted: #5b6b75;
  --border: #d7e5e3;
  --teal: #0f766e;
  --soft-blue: #eaf4ff;
  --teal-soft: #d9f2ef;
  --shadow: 0 18px 45px rgba(15,118,110,.08);
}
body { margin:0; font-family:"Pretendard","Noto Sans KR","Apple SD Gothic Neo",Arial,sans-serif; background:var(--bg); color:var(--text); line-height:1.6; }
a { text-decoration:none; color:inherit; }
.container { width:min(1200px, calc(100% - 48px)); margin:0 auto; }
.header { position:sticky; top:0; z-index:20; background:rgba(255,255,255,.92); backdrop-filter:blur(10px); border-bottom:1px solid rgba(215,229,227,.9); }
.header-inner { display:flex; align-items:flex-start; justify-content:space-between; gap:24px; min-height:84px; padding:18px 0 14px; }
.brand { display:flex; flex-direction:column; gap:4px; }
.brand-title { font-size:2rem; font-weight:800; letter-spacing:-.03em; color:#102236; }
.brand-sub { font-size:.95rem; color:var(--muted); }
.header-context { display:flex; align-items:center; justify-content:flex-end; gap:12px; margin-left:auto; align-self:flex-start; margin-top:2px; flex-wrap:wrap; }
.header-action-btn, .nav-btn, .action-btn, .submit-btn {
  display:inline-flex; align-items:center; justify-content:center; min-width:120px; height:52px; padding:0 20px;
  border-radius:999px; border:1px solid var(--border); background:var(--soft-blue); color:#23404d;
  font-size:.98rem; font-weight:800; transition:.2s ease; cursor:pointer;
}
.current-user-chip {
  display:inline-flex; align-items:center; justify-content:center; min-width:190px; height:52px; padding:0 22px;
  border-radius:999px; border:1px solid #cfd9d7; background:#f7fbfa; color:#405260; font-size:1rem; font-weight:800;
  cursor:default; box-shadow: inset 0 0 0 1px rgba(255,255,255,.6);
}
.header-action-btn:hover, .nav-btn:hover, .action-btn:hover, .submit-btn:hover, .nav-btn.active {
  background:var(--teal); color:#fff; border-color:var(--teal); box-shadow:0 10px 22px rgba(15,118,110,.18);
}
.page { padding:48px 0 80px; }
.dashboard-header-card, .panel, .form-card {
  background:rgba(255,255,255,.96); border:1px solid var(--border); border-radius:30px; padding:28px 26px; box-shadow:var(--shadow);
}
.dashboard-header-card { margin-bottom:24px; }
.dashboard-header-top { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; flex-wrap:wrap; }
.dashboard-header-card h2, .panel h3, .form-card h3 {
  margin:0; color:#0b1f30; letter-spacing:-.04em;
}
.dashboard-header-card h2 { font-size:clamp(2rem, 3.4vw, 2.8rem); line-height:1.2; }
.page-nav { display:flex; gap:14px; flex-wrap:wrap; margin-top:24px; }
.muted { color:var(--muted); }
.intro-emphasis {
  font-size: 1.28rem;
  line-height: 1.9;
  color: #0f4f68;
  font-weight: 700;
  max-width: 1120px;
  margin: 14px 0 10px;
}
.nowrap { white-space: nowrap; }
.layout { display:grid; grid-template-columns:1fr 1.08fr; gap:22px; }
.panel, .form-card { border-radius:24px; }
.panel h3, .form-card h3 { font-size:1.35rem; margin-bottom:12px; }
.note {
  padding:16px 18px; border-radius:18px; border:1px solid var(--border); background:var(--surface-soft);
  color:#4f6070; font-size:.96rem; line-height:1.7;
}
.tag-grid {
  display:grid;
  grid-template-columns:repeat(2, minmax(0, 1fr));
  gap:16px;
  margin-top:20px;
  width:100%;
}
.tag-option {
  display:flex; align-items:center; justify-content:center;
  min-height:82px; padding:12px 18px;
  border:1px solid var(--border); border-radius:20px; background:#fff; color:#23404d;
  font-size:1.06rem; font-weight:800; cursor:pointer; transition:.2s ease; text-align:center;
  width:100%;
}
.tag-option.active, .tag-option:hover {
  background:var(--teal); color:#fff; border-color:var(--teal); box-shadow:0 10px 22px rgba(15,118,110,.15);
}
.form { display:flex; flex-direction:column; gap:12px; }
.field { display:flex; flex-direction:column; gap:8px; }
label { font-size:1rem; font-weight:800; color:#0f172a; }
input, textarea {
  width:100%; min-height:52px; padding:0 16px; border-radius:16px; border:1px solid #cfd9d7; background:#fff;
  font-size:1rem; color:#0f172a; outline:none; transition:border-color .2s ease, box-shadow .2s ease;
}
textarea { min-height:130px; padding:14px 16px; resize:vertical; }
input:focus, textarea:focus {
  border-color:var(--teal); box-shadow:0 0 0 4px rgba(15,118,110,.10);
}
.readonly { background:#f7fbfa !important; color:#5b6b75 !important; }
.detail-list { display:grid; gap:12px; margin-top:6px; }
.detail-item { padding-bottom:12px; border-bottom:1px solid #dbe7e5; }
.detail-item:last-child { border-bottom:none; padding-bottom:0; }
.detail-item .k { display:block; font-size:.9rem; color:#5b6b75; font-weight:800; margin-bottom:4px; }
.detail-item .v { display:block; font-size:1rem; color:#0f172a; line-height:1.7; }
.actions { display:flex; justify-content:flex-end; gap:12px; flex-wrap:wrap; margin-top:18px; }
.submit-btn { min-width:160px; }
.footer-space { height:24px; }

@media (max-width:1080px){
  .layout { grid-template-columns:1fr; }
  .tag-grid { grid-template-columns:repeat(2, minmax(0, 1fr)); }
}
@media (max-width:760px){
  .tag-grid { grid-template-columns:1fr; }

  .container { width:min(100% - 28px, 1200px); }
  .header-inner { min-height:auto; padding:16px 0; align-items:flex-start; flex-direction:column; }
  .header-context, .page-nav, .actions { gap:10px; }
  .dashboard-header-card, .panel, .form-card { padding:22px 18px; border-radius:24px; }
  .dashboard-header-top, .actions { flex-direction:column; align-items:flex-start; }
}
  </style>
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <div class="brand">
        <a href="M100.html" class="brand-title">모아아이</a>
        <div class="brand-sub">보유 특허 관리 및 기술연계 플랫폼</div>
      </div>
      <div class="header-context">
        <span class="current-user-chip">대박전자 전현무님</span>
        <a href="M210.html" class="header-action-btn">정보관리</a>
        <a href="M110.html" class="header-action-btn">로그아웃</a>
      </div>
    </div>
  </header>

  <main class="page">
    <section>
      <div class="container">
        <div class="dashboard-header-card">
          <div class="dashboard-header-top">
            <div style="width:100%; max-width:1120px;">
              <h2>신규 특허 출원 관련 문의</h2>
              <p class="muted intro-emphasis">모아아이는 기업의 빠르고 성공적인 특허 출원 및 등록을 위해<br>각 분야에 특화된 전문 변리사 및 변리사 사무실을 선정하여 협력 관계를 구축하고 있습니다.<br>아래 전문 분야를 선택해 주시면 해당 분야에 적합한 변리사와 함께 관련 상담 및 절차에 대해 안내드리겠습니다.</p>
</div>
          </div>
        </div>

        <div class="layout">
          <div class="panel">
            <h3>전문 분야 선택</h3>
            <p class="muted">특허와 가장 가까운 전문 분야를 선택해 주세요.</p>

            <div class="tag-grid" id="fieldGrid">
              <button type="button" class="tag-option">기계/장비</button>
              <button type="button" class="tag-option">전기/전자</button>
              <button type="button" class="tag-option">반도체</button>
              <button type="button" class="tag-option">배터리/에너지</button>
              <button type="button" class="tag-option">화학/소재</button>
              <button type="button" class="tag-option">바이오/의료기기</button>
              <button type="button" class="tag-option">AI/소프트웨어</button>
              <button type="button" class="tag-option">통신/네트워크</button>
              <button type="button" class="tag-option">로봇/자동화</button>
              <button type="button" class="tag-option">모빌리티/자동차</button>
              <button type="button" class="tag-option">디스플레이</button>
              <button type="button" class="tag-option">환경/에너지</button>
            </div>
          </div>

          <div class="form-card">
            <h3>출원 문의 정보</h3>
            <form class="form">
              <div class="field">
                <label for="companyName">회사명</label>
                <input id="companyName" class="readonly" type="text" value="대박전자" readonly />
              </div>
              <div class="field">
                <label for="managerName">담당자명</label>
                <input id="managerName" class="readonly" type="text" value="전현무" readonly />
              </div>
              <div class="field">
                <label for="replyPhone">연락 받을 연락처</label>
                <input id="replyPhone" type="text" value="010-1234-5678" />
              </div>
              <div class="field">
                <label for="replyEmail">연락 받을 이메일</label>
                <input id="replyEmail" type="text" value="jhm@daebak.co.kr" />
              </div>
              <div class="field">
                <label for="summary">문의 개요</label>
                <textarea id="summary" placeholder="예: 신규 특허 출원을 검토 중이며, 전기/전자 분야 전문 변리사와의 상담을 요청드립니다."></textarea>
              </div>
              <div class="actions">
                <a href="M200.html" class="action-btn">취소</a>
                <a href="M200.html" class="submit-btn">요청하기</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div class="footer-space"></div>

  <script>
    const buttons = document.querySelectorAll('.tag-option');
    buttons.forEach((btn) => {
      btn.addEventListener('click', () => {
        btn.classList.toggle('active');
      });
    });
  </script>
</body>
</html>
